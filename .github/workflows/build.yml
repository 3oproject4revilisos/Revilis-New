          # ----------------------------------------------------------------
          mkdir -p config/includes.chroot/usr/local/bin
          cat > config/includes.chroot/usr/local/bin/revilis-lock << 'LOCK'
          #!/bin/bash
          betterlockscreen -l dimblur
          LOCK
          chmod +x config/includes.chroot/usr/local/bin/revilis-lock

          # ----------------------------------------------------------------
          # 11. PLYMOUTH CUSTOM THEME
          # ----------------------------------------------------------------
          mkdir -p config/includes.chroot/usr/share/plymouth/themes/revilis
          cat > config/includes.chroot/usr/share/plymouth/themes/revilis/revilis.plymouth << 'PLY'
          [Plymouth Theme]
          Name=Revilis
          Description=Custom Revilis boot splash
          ModuleName=script
          [script]
          ImageDir=/usr/share/plymouth/themes/revilis
          ScriptFile=/usr/share/plymouth/themes/revilis/revilis.script
          PLY
          cat > config/includes.chroot/usr/share/plymouth/themes/revilis/revilis.script << 'SCRIPT'
          wallpaper_image = Image("wallpaper.png");
          logo_image = Image("logo.png");
          spinner_frame1 = Image("spinner-1.png");
          spinner_frame2 = Image("spinner-2.png");
          spinner_frame3 = Image("spinner-3.png");
          spinner_frame4 = Image("spinner-4.png");
          spinner = Sprite(spinner_frame1, spinner_frame2, spinner_frame3, spinner_frame4);
          spinner.SetX(Window.GetWidth()/2 - spinner.GetWidth()/2);
          spinner.SetY(Window.GetHeight()/2 - spinner.GetHeight()/2 + 80);
          spinner.SetOpacity(0.8);
          fun refresh_callback() {
            spinner.SetOpacity(0.8 + 0.2 * Math.sin(Plymouth.GetTime()));
          }
          Plymouth.SetRefreshFunction(refresh_callback);
          SCRIPT
          # Copy wallpaper to theme
          cp /usr/share/backgrounds/revilis-wallpaper.png /usr/share/plymouth/themes/revilis/wallpaper.png 2>/dev/null || true
          # Generate logo and spinner frames
          convert -size 200x200 xc:transparent -fill '#ffaa00' -gravity center -pointsize 120 -font DejaVu-Sans-Bold -annotate 0 '🥔' /usr/share/plymouth/themes/revilis/logo.png 2>/dev/null || true
          for i in 1 2 3 4; do
            convert -size 64x64 xc:none -fill white -draw "arc 16,16 48,48 0,360" -channel A -evaluate multiply 0.5 +channel /usr/share/plymouth/themes/revilis/spinner-$i.png 2>/dev/null || true
          done
          plymouth-set-default-theme revilis 2>/dev/null || true

          # ----------------------------------------------------------------
          # 12. CALAMARES BRANDING + CONFIG
          # ----------------------------------------------------------------
          mkdir -p config/includes.chroot/etc/calamares/branding/revilis
          cat > config/includes.chroot/etc/calamares/branding/revilis/branding.desc << 'BRAND'
          ---
          componentName:  revilis
          welcomeStyleCalamares:   true
          welcomeExpandingLogo:   true
          productName:   Revilis OS
          productVersion:   1.0
          productUrl:   https://github.com/revilis
          productIcon:   logo
          BRAND

          # ----------------------------------------------------------------
          # 13. SUDOERS FOR REVILIS CLI
          # ----------------------------------------------------------------
          mkdir -p config/includes.chroot/etc/sudoers.d
          cat > config/includes.chroot/etc/sudoers.d/revilis << 'SUDOERS'
