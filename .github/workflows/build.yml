            "window_type = 'dock'",
            "window_type = 'desktop'"
          ];
          shadow = true;
          shadow-radius = 12;
          shadow-opacity = 0.35;
          fading = true;
          fade-in-step = 0.03;
          fade-out-step = 0.03;
          PICOM

          # ----------------------------------------------------------------
          # 8. DYNAMIC WALLPAPER GENERATOR + VIDEO WALLPAPER
          # ----------------------------------------------------------------
          mkdir -p config/includes.chroot/usr/share/backgrounds
          cat > config/includes.chroot/usr/local/bin/revilis-wallpaper-gen << 'WALLGEN'
          #!/bin/bash
          # Generate a beautiful gradient wallpaper
          OUT="/usr/share/backgrounds/revilis-wallpaper.png"
          convert -size 1920x1080 gradient:'#2d1b4e'-'#0f0f23' \
            -font DejaVu-Sans-Bold -pointsize 80 -fill '#ffaa00' -gravity center \
            -annotate +0-40 '🥔 Revilis OS' \
            -pointsize 30 -fill '#ffffff' -gravity center \
            -annotate +0+60 'Revive your hardware. Rediscover speed.' \
            "$OUT" 2>/dev/null || echo "ImageMagick failed; fallback."
          if [[ ! -f "$OUT" ]]; then
            cat > /usr/share/backgrounds/revilis-wallpaper.svg << 'SVG'
            <svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080">
              <rect width="1920" height="1080" fill="#1a1a2e"/>
              <text x="960" y="540" font-family="sans-serif" font-size="72" fill="#6c5ce7" text-anchor="middle" dominant-baseline="central">🥔 Revilis OS</text>
              <text x="960" y="620" font-family="sans-serif" font-size="28" fill="#b2bec3" text-anchor="middle" dominant-baseline="central">Revive Your Hardware. Rediscover Speed.</text>
            </svg>
            SVG
            convert /usr/share/backgrounds/revilis-wallpaper.svg /usr/share/backgrounds/revilis-wallpaper.png 2>/dev/null || true
          fi
          # Generate a video wallpaper from the static image (hardware-aware)
          RAM_MB=$(free -m | awk '/^Mem:/{print $2}')
          if [[ $RAM_MB -gt 4000 ]]; then
              DURATION=300  # 5 minutes
              QUALITY="high"
          elif [[ $RAM_MB -gt 2000 ]]; then
              DURATION=120  # 2 minutes
              QUALITY="medium"
          else
              DURATION=60   # 1 minute
              QUALITY="low"
          fi
          echo "Generating video wallpaper (duration: ${DURATION}s, quality: $QUALITY)..."
          if command -v ffmpeg >/dev/null; then
              ffmpeg -loop 1 -i "$OUT" -vf "zoompan=z='min(zoom+0.001,1.3)':d=125,scale=1920:1080" -t "$DURATION" \
                  /usr/share/backgrounds/revilis-wallpaper.mp4 2>/dev/null || true
          fi
          WALLGEN
          chmod +x config/includes.chroot/usr/local/bin/revilis-wallpaper-gen

          # Run wallpaper generator in a hook
          mkdir -p config/hooks/live
          cat > config/hooks/live/9000-revilis-wallpaper.hook.chroot << 'WALLHOOK'
          #!/bin/sh
          /usr/local/bin/revilis-wallpaper-gen || true
          WALLHOOK
          chmod +x config/hooks/live/9000-revilis-wallpaper.hook.chroot

          # ----------------------------------------------------------------
