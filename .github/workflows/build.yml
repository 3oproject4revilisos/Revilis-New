          LIGHTDM

          cat > config/includes.chroot/etc/lightdm/lightdm-gtk-greeter.conf << 'GREETER'
          [greeter]
          background=/usr/share/backgrounds/revilis-wallpaper.png
          theme-name=Arc-Dark
