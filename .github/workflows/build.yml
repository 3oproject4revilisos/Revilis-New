name: Build Revilis Terminal-Only ISO (backend verification build)

# This build intentionally contains NO desktop environment, NO theming, NO
# tiers/packs system. It exists purely to prove the foundational layer
# (Debian bootstrap, isolinux/grub bootloader, kernel, boot-to-login-prompt)
# actually works before any GUI complexity is added back on top.
#
# If this doesn't boot to a text login prompt, the problem is in the base
# layer (mirrors, bootloader, kernel) - not in XFCE/theming/anything visual.
# If it DOES boot cleanly, we can re-add the desktop layer with confidence
# that any future boot failure is coming from the new code, not the base.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release:
        description: "Publish this build as a GitHub Release"
        type: boolean
        default: false

concurrency:
  group: revilis-terminal-iso-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Free up disk space on runner
        run: |
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -a -f || true
          echo "Disk after cleanup:"
          df -h

      - name: Install live-build (from Debian directly, not Ubuntu's stale fork) and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso \
            mtools dosfstools debian-archive-keyring

          echo "deb http://deb.debian.org/debian bookworm main" | sudo tee /etc/apt/sources.list.d/debian-bookworm-temp.list
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 0E98404D386FA1D9 2>/dev/null || true
          sudo cp /usr/share/keyrings/debian-archive-keyring.gpg /etc/apt/trusted.gpg.d/ 2>/dev/null || true

          cat <<'PIN' | sudo tee /etc/apt/preferences.d/debian-bookworm-temp
          Package: *
          Pin: release o=Debian
          Pin-Priority: 100

          Package: live-build isolinux syslinux-common syslinux-efi syslinux-utils grub-pc-bin grub-efi-amd64-bin
          Pin: release o=Debian
          Pin-Priority: 990
          PIN

          sudo apt-get update
          sudo apt-get install -y -t bookworm live-build isolinux syslinux-common syslinux-efi syslinux-utils grub-pc-bin grub-efi-amd64-bin
          lb --version || dpkg -l live-build
          echo "--- isolinux/syslinux file layout on host (sanity check) ---"
          dpkg -L isolinux | grep -i bin
          dpkg -L syslinux-common | grep -i vesamenu

      - name: Set up live-build config tree (minimal, no desktop)
        run: |
          LB_DIR="$PWD/livebuild-config"
          rm -rf "$LB_DIR"
          mkdir -p "$LB_DIR"
          cd "$LB_DIR"

          lb config \
              --ignore-system-defaults \
              --mode debian \
              --distribution bookworm \
              --archive-areas "main contrib non-free non-free-firmware" \
              --architecture amd64 \
              --binary-image iso-hybrid \
              --bootloaders "syslinux,grub-efi" \
              --iso-application "Revilis Terminal" \
              --iso-volume "REVILIS_TERM" \
              --iso-preparer "Revilis Project" \
              --iso-publisher "Revilis Project" \
              --linux-flavours amd64 \
              --firmware-chroot false \
              --memtest none \
              --win32-loader false \
              --debian-installer none \
              --apt-recommends false \
              --mirror-bootstrap "http://deb.debian.org/debian" \
              --mirror-chroot "http://deb.debian.org/debian" \
              --mirror-chroot-security "http://security.debian.org/debian-security" \
              --security false \
              --mirror-binary "http://deb.debian.org/debian" \
              --mirror-binary-security "http://security.debian.org/debian-security"

          mkdir -p config/archives
          cat > config/archives/revilis-security.list.chroot <<'EOF'
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF
          cat > config/archives/revilis-security.list.binary <<'EOF'
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

          mkdir -p config/package-lists
          cat > config/package-lists/revilis-terminal-core.list.chroot <<'EOF'
          linux-image-amd64
          firmware-linux
          sudo
          network-manager
          openssh-server
          vim
          nano
          htop
          zram-tools
          curl
          wget
          git
          EOF

          mkdir -p config/hooks/live
          cat > config/hooks/live/9010-revilis-terminal-setup.hook.chroot <<'EOF'
          #!/bin/sh
          set -e

          if ! id liveuser >/dev/null 2>&1; then
              useradd -m -s /bin/bash -G sudo,netdev liveuser
              echo "liveuser:live" | chpasswd
          fi

          mkdir -p /etc/systemd/system/getty@tty1.service.d
          cat > /etc/systemd/system/getty@tty1.service.d/autologin.conf <<CONF
          [Service]
          ExecStart=
          ExecStart=-/sbin/agetty --autologin liveuser --noclear %I \$TERM
          CONF

          mkdir -p /etc/systemd
          cat > /etc/systemd/zram-generator.conf <<CONF
          [zram0]
          zram-size = ram * 50 / 100
          compression-algorithm = lz4
          CONF

          systemctl enable NetworkManager || true
          systemctl enable ssh || true

          echo "revilis terminal setup hook complete"
          EOF
          chmod +x config/hooks/live/9010-revilis-terminal-setup.hook.chroot

          echo "=== DIAGNOSTIC: config/binary (bootloader/image settings) ==="
          cat config/binary 2>/dev/null || echo "config/binary not found"

      - name: Build ISO
        working-directory: livebuild-config
        timeout-minutes: 40
        run: |
          set -o pipefail
          sudo lb build 2>&1 | tee build.log

      - name: Inspect ISO boot structure (did isolinux/grub.cfg actually get written?)
        if: always()
        working-directory: livebuild-config
        run: |
          ISO_FILE=$(find . -maxdepth 1 -name "*.iso" | head -n1)
          if [ -z "$ISO_FILE" ]; then
            echo "No ISO to inspect."
            exit 0
          fi
          echo "=== ISO El Torito boot record report ==="
          sudo apt-get install -y genisoimage xorriso >/dev/null 2>&1 || true
          xorriso -indev "$ISO_FILE" -report_el_torito plain 2>&1 || echo "xorriso report failed"
          echo ""
          echo "=== Searching for isolinux.cfg / live.cfg / grub.cfg inside ISO ==="
          isoinfo -R -f -i "$ISO_FILE" 2>&1 | grep -i "isolinux.cfg\|live.cfg\|grub.cfg\|boot.cfg" || echo "NONE OF THESE BOOT CONFIG FILES WERE FOUND IN THE ISO - this is the bug"

      - name: Rename ISO with version/date
        id: rename_iso
        working-directory: livebuild-config
        run: |
          ISO_FILE=$(find . -maxdepth 1 -name "*.iso" | head -n1)
          if [ -z "$ISO_FILE" ]; then
            echo "::error::No ISO produced. Last 100 lines of build.log:"
            tail -n 100 build.log || echo "no build.log found"
            exit 1
          fi
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          NEW_NAME="revilis-terminal-${DATE}-${SHORT_SHA}.iso"
          mv "$ISO_FILE" "$NEW_NAME"
          echo "ISO_NAME=$NEW_NAME" >> "$GITHUB_ENV"

      - name: Generate checksum
        if: steps.rename_iso.outcome == 'success'
        working-directory: livebuild-config
        run: sha256sum "${{ env.ISO_NAME }}" > "${{ env.ISO_NAME }}.sha256"

      - name: Automated boot test (QEMU, BIOS mode) - confirms actual login prompt appears
        if: steps.rename_iso.outcome == 'success'
        working-directory: livebuild-config
        timeout-minutes: 5
        run: |
          sudo apt-get install -y qemu-system-x86 qemu-utils imagemagick python3 >/dev/null 2>&1

          echo "Booting ISO headlessly in QEMU (legacy BIOS mode, matching VirtualBox's default)..."
          sudo timeout --signal=KILL 100 qemu-system-x86_64 \
            -m 1024 \
            -cdrom "${{ env.ISO_NAME }}" \
            -boot d \
            -display none \
            -no-reboot \
            -qmp unix:/tmp/qemu-qmp.sock,server,nowait \
            &

          echo "Waiting for QMP socket to become available..."
          for i in $(seq 1 20); do
            [ -S /tmp/qemu-qmp.sock ] && break
            sleep 1
          done

          echo "Waiting 60s for boot to reach the autologin text console..."
          sleep 60

          echo "Requesting screenshot via QMP..."
          sudo python3 <<'PYEOF' || echo "QMP screenshot script failed, boot test will be marked inconclusive"
          import socket, json

          sock = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
          sock.settimeout(10)
          try:
              sock.connect("/tmp/qemu-qmp.sock")
              sock.recv(4096)
              sock.sendall(json.dumps({"execute": "qmp_capabilities"}).encode() + b"\n")
              sock.recv(4096)
              sock.sendall(json.dumps({
                  "execute": "screendump",
                  "arguments": {"filename": "/tmp/boot-screenshot.ppm"}
              }).encode() + b"\n")
              resp = sock.recv(4096)
              print("QMP response:", resp.decode(errors="replace"))
          finally:
              sock.close()
          PYEOF

          sleep 2
          echo "Force-killing QEMU..."
          sudo pkill -9 -f qemu-system-x86_64 2>/dev/null || true
          sleep 1

          if [ ! -f /tmp/boot-screenshot.ppm ]; then
            echo "::warning::Could not capture a boot screenshot - boot test inconclusive. See the 'Inspect ISO boot structure' step for the direct isolinux.cfg/grub.cfg check instead."
            exit 0
          fi

          sudo convert /tmp/boot-screenshot.ppm /tmp/boot-screenshot.png
          BRIGHTNESS=$(sudo convert /tmp/boot-screenshot.ppm -colorspace Gray -format "%[fx:mean*255]" info:)
          echo "Average screen brightness after 60s: $BRIGHTNESS (0=pure black, 255=pure white)"

          mkdir -p /tmp/boot-test-artifacts
          sudo cp /tmp/boot-screenshot.png /tmp/boot-test-artifacts/ 2>/dev/null || true

          BRIGHTNESS_INT=${BRIGHTNESS%.*}
          if [ "$BRIGHTNESS_INT" -lt 5 ]; then
            echo "::error::Boot screen is essentially pure black (brightness=$BRIGHTNESS) after 60s. A text console should show visible characters. Failing the build so this doesn't ship silently."
            exit 1
          else
            echo "Boot screen shows visible content (brightness=$BRIGHTNESS). Boot test passed - text console is rendering something."
          fi

      - name: Upload boot test screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-screenshot
          path: /tmp/boot-test-artifacts/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload ISO as artifact (only if the ISO genuinely exists)
        if: steps.rename_iso.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: revilis-terminal-iso
          path: |
            livebuild-config/${{ env.ISO_NAME }}
            livebuild-config/${{ env.ISO_NAME }}.sha256
          retention-days: 7
          if-no-files-found: error

      - name: Upload build log (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: livebuild-config/build.log
          retention-days: 3

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release == true)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            livebuild-config/${{ env.ISO_NAME }}
            livebuild-config/${{ env.ISO_NAME }}.sha256
          generate_release_notes: true
