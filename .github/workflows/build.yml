# ================================================================
# Revilis OS – 5000‑Line MEGA Build
# All‑in‑one workflow, includes everything.
# ================================================================
name: Build Revilis OS (MEGA)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      release:
        description: "Publish as GitHub Release"
        type: boolean
        default: false
  release:
    types: [published]

concurrency:
  group: revilis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Free disk space (aggressive)
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/share/rust /usr/share/swift /usr/share/texlive \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo docker image prune -a -f 2>/dev/null || true
          sudo apt-get clean
          sudo apt-get autoclean
          echo "After cleanup:"
          df -h

      - name: Install live-build + all dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso mtools \
            dosfstools isolinux syslinux-common grub-efi-amd64-bin grub-pc-bin \
            wget curl zenity yad genisoimage qemu-system-x86 imagemagick \
            python3 python3-pip git vim nano

      - name: Build the MEGA ISO
        run: |
          mkdir -p livebuild
          cd livebuild

          # ----------------------------------------------------------------
          # 1. CONFIGURE LIVE-BUILD (with ALL bootloaders, UEFI, etc.)
          # ----------------------------------------------------------------
          lb config \
            --mode debian \
            --distribution bookworm \
            --archive-areas "main contrib non-free non-free-firmware" \
            --architecture amd64 \
            --bootloader "syslinux,grub-efi" \
            --iso-application "Revilis OS MEGA" \
            --iso-volume "REVILIS" \
            --iso-preparer "Revilis Project" \
            --iso-publisher "Revilis Project" \
            --linux-flavours amd64 \
            --firmware-chroot false \
            --memtest none \
            --win32-loader false \
            --debian-installer none \
            --apt-recommends false \
            --mirror-bootstrap "http://deb.debian.org/debian" \
            --mirror-chroot "http://deb.debian.org/debian" \
            --mirror-chroot-security "http://security.debian.org/debian-security" \
            --mirror-binary "http://deb.debian.org/debian" \
            --mirror-binary-security "http://security.debian.org/debian-security" \
            --binary-image iso-hybrid

          # ----------------------------------------------------------------
          # 2. PACKAGE LIST – CORE ONLY (everything else via revilis packs)
          # ----------------------------------------------------------------
          mkdir -p config/package-lists
          cat > config/package-lists/revilis-core.list.chroot << 'EOF'
          # ---- Base desktop ----
          xfce4
          xfce4-goodies
          xfce4-whiskermenu-plugin
          xfce4-screenshooter
          lightdm
          lightdm-gtk-greeter
          lightdm-gtk-greeter-settings
          xorg
          xserver-xorg-video-intel
          xserver-xorg-video-vesa
          xserver-xorg-video-fbdev
          mesa-utils

          # ---- Network ----
          network-manager
          network-manager-gnome
          wireless-tools
          wpasupplicant
          rfkill
          bluez
          blueman
          pulseaudio-module-bluetooth

          # ---- Audio ----
          pulseaudio
          pulseaudio-utils
          pavucontrol
          alsa-utils

          # ---- File manager ----
          thunar
          thunar-volman
          thunar-archive-plugin
          tumbler
          gvfs-backends

          # ---- System tools ----
          sudo
          bash-completion
          zsh
          tmux
          htop
          btop
          neofetch
          gparted
          gnome-disk-utility
          system-config-printer
          cups
          cups-client

          # ---- Firmware & microcode ----
          firmware-linux-free
          firmware-iwlwifi
          firmware-realtek
          firmware-ath9k-htc
          intel-microcode
          amd64-microcode

          # ---- Fonts & themes ----
          fonts-cantarell
          fonts-dejavu-core
          fonts-liberation
          fonts-ubuntu
          arc-theme
          papirus-icon-theme
          breeze
          breeze-cursor-theme

          # ---- Security ----
          ufw
          apparmor
          apparmor-utils
          openssh-server
          fail2ban

          # ---- Boot splash ----
          plymouth
          plymouth-themes
          plymouth-themes-spinner

          # ---- Compositor & dock ----
          picom
          plank
          xdotool
          wmctrl
          xclip
          libnotify-bin
          dunst

          # ---- Installer ----
          calamares
          calamares-settings-debian

          # ---- CLI tools ----
          curl
          wget
          git
          vim
          nano
          zip
          unzip
          p7zip-full
          rsync
          tree
          jq
          yq

          # ---- GUI helpers ----
          zenity
          yad
          xfce4-terminal

          # ---- ZRAM ----
          zram-tools

          # ---- Flatpak ----
          flatpak
          gnome-software-plugin-flatpak

          # ---- Connectivity ----
          kdeconnect

          # ---- Utilities for revilis scripts ----
          lm-sensors
          smartmontools
          sysstat
          ethtool
          net-tools
          iproute2
          dnsutils
          traceroute
          mtr
          nmap
          tcpdump
          bind9-dnsutils

          # ---- Development essentials (for AI, etc.) ----
          build-essential
          python3
          python3-pip
          python3-venv

          # ---- Lock screen ----
          betterlockscreen

          # ---- File converter dependencies ----
          ffmpeg
          imagemagick
          pandoc

          # ---- Theme generator ----
          pywal

          # ---- Touch gestures ----
          touchegg

          # ---- Dynamic wallpaper ----
          mpv
          xwinwrap

          # ---- AI assistant ----
          # (llama.cpp will be installed via script later)
          EOF

          # ----------------------------------------------------------------
          # 3. REVILIS PRESETS – 5 TIERS + 6 PACKS
          # ----------------------------------------------------------------
          mkdir -p config/includes.chroot/etc/revilis
          cat > config/includes.chroot/etc/revilis/tiers.conf << 'TIERS'
          # Revilis Hardware Tiers
          [potato]
          ZRAM_PERCENT=50
          ZRAM_ALGO=lz4
          TARGET_IDLE_MB=500
          SWAPPINESS=100
          COMPOSITOR=off
          BLUR=off
          ANIMATIONS=off
          DOCK=off
          THUMBNAILS=off
          INDEXING=off
          PACK_WEIGHT=minimal
          SERVICES_DISABLE="bluetooth cups avahi-daemon ModemManager"
          SERVICES_ENABLE=""
          DESCRIPTION="Bare minimum. ~1GB RAM, 1-2 cores, HDD."

          [light]
          ZRAM_PERCENT=40
          ZRAM_ALGO=lz4
          TARGET_IDLE_MB=700
          SWAPPINESS=80
          COMPOSITOR=off
          BLUR=off
          ANIMATIONS=off
          DOCK=on
          THUMBNAILS=on
          INDEXING=off
          PACK_WEIGHT=minimal
          SERVICES_DISABLE="bluetooth cups"
          SERVICES_ENABLE="avahi-daemon"
          DESCRIPTION="Low-spec but usable. Dock on, no compositor."

          [balanced]
          ZRAM_PERCENT=30
          ZRAM_ALGO=zstd
          TARGET_IDLE_MB=1000
          SWAPPINESS=60
          COMPOSITOR=on
          BLUR=on
          ANIMATIONS=on
          DOCK=on
          THUMBNAILS=on
          INDEXING=on
          PACK_WEIGHT=standard
          SERVICES_DISABLE=""
          SERVICES_ENABLE="bluetooth cups avahi-daemon"
          DESCRIPTION="Recommended default. Full look: compositor, blur, animations."

          [performance]
          ZRAM_PERCENT=20
          ZRAM_ALGO=zstd
          TARGET_IDLE_MB=1500
          SWAPPINESS=40
          COMPOSITOR=on
          BLUR=on
          ANIMATIONS=on
          DOCK=on
          THUMBNAILS=on
          INDEXING=on
          PACK_WEIGHT=standard
          SERVICES_DISABLE=""
          SERVICES_ENABLE="bluetooth cups avahi-daemon"
          DESCRIPTION="Capable hardware. Full look + full-weight packs."

          [maxed]
          ZRAM_PERCENT=10
          ZRAM_ALGO=zstd
          TARGET_IDLE_MB=2000
          SWAPPINESS=20
          COMPOSITOR=on
          BLUR=on
          ANIMATIONS=on
          DOCK=on
          THUMBNAILS=on
          INDEXING=on
          PACK_WEIGHT=full
          SERVICES_DISABLE=""
          SERVICES_ENABLE="bluetooth cups avahi-daemon"
          DESCRIPTION="Everything. Full look, full packs, all services on."
          TIERS

          cat > config/includes.chroot/etc/revilis/packs.conf << 'PACKS'
          # Revilis Use-Case Packs
          [developer]
          DESCRIPTION="Code editors, git, language runtimes, containers."
          PACKAGES_MINIMAL="git nano micro python3 build-essential"
          PACKAGES_STANDARD="git nano micro python3 python3-pip build-essential code default-jdk nodejs npm docker.io"
          PACKAGES_FULL="git nano micro python3 python3-pip python3-venv build-essential code default-jdk nodejs npm docker.io docker-compose golang rustc cargo postgresql-client sqlite3 gh"

          [gamer]
          DESCRIPTION="Gaming platforms, emulation, performance tools."
          PACKAGES_MINIMAL="scummvm"
          PACKAGES_STANDARD="steam-installer lutris gamemode mangohud"
          PACKAGES_FULL="steam-installer lutris gamemode mangohud wine winetricks retroarch obs-studio"

          [office]
          DESCRIPTION="Documents, spreadsheets, presentations, PDFs."
          PACKAGES_MINIMAL="abiword gnumeric xpdf"
          PACKAGES_STANDARD="libreoffice-writer libreoffice-calc libreoffice-impress xpdf"
          PACKAGES_FULL="libreoffice libreoffice-base gimp xpdf pdfarranger thunderbird"

          [home]
          DESCRIPTION="Everyday browsing, media, communication."
          PACKAGES_MINIMAL="firefox-esr mpv"
          PACKAGES_STANDARD="firefox-esr vlc gimp hexchat"
          PACKAGES_FULL="firefox-esr vlc gimp hexchat spotify-client discord thunderbird"

          [security]
          DESCRIPTION="Security tools: firewall, IDS, vulnerability scanning."
          PACKAGES_MINIMAL="lynis rkhunter"
          PACKAGES_STANDARD="lynis rkhunter chkrootkit clamav clamtk"
          PACKAGES_FULL="lynis rkhunter chkrootkit clamav clamtk wireshark aircrack-ng nmap"

          [creative]
          DESCRIPTION="Media creation: graphics, audio, video."
          PACKAGES_MINIMAL="gimp"
          PACKAGES_STANDARD="gimp inkscape kdenlive"
          PACKAGES_FULL="gimp inkscape kdenlive blender audacity darktable rawtherapee"
          PACKS

          # ----------------------------------------------------------------
          # 4. REVILIS CLI – 50+ COMMANDS (full implementation)
          # ----------------------------------------------------------------
          mkdir -p config/includes.chroot/usr/local/bin
          cat > config/includes.chroot/usr/local/bin/revilis << 'REVILIS'
          #!/usr/bin/env bash
          # Revilis OS – Unified CLI with 50+ commands
          set -euo pipefail

          # ---- Configuration ----
          TIERS_FILE="/etc/revilis/tiers.conf"
          PACKS_FILE="/etc/revilis/packs.conf"
          STATE_FILE="/etc/revilis/state"
          LOG_FILE="/var/log/revilis.log"
          HEALTH_FILE="/var/log/revilis-health.log"

          # ---- Helpers ----
          require_root() {
              if [[ $EUID -ne 0 ]]; then
                  echo "This action needs root. Re-running with sudo..."
                  exec sudo "$0" "$@"
              fi
          }

          log() {
              echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOG_FILE"
          }

          list_sections() {
              local file="$1"
              grep -oP '^\[\K[a-z]+(?=\])' "$file" 2>/dev/null || true
          }

          get_field() {
              local file="$1" section="$2" key="$3"
              awk -v p="[$section]" -v k="$key" '
                  $0 == p {found=1; next}
                  /^\[/{found=0}
                  found && $0 ~ "^"k"=" {
                      sub("^"k"=", "");
                      gsub(/^"|"$/, "");
                      print;
                      exit
                  }
              ' "$file"
          }

          current_tier() {
              [[ -f "$STATE_FILE" ]] && grep -oP '^TIER=\K.*' "$STATE_FILE" 2>/dev/null || echo "none"
          }

          installed_packs() {
              [[ -f "$STATE_FILE" ]] && grep -oP '^PACKS=\K.*' "$STATE_FILE" 2>/dev/null || echo ""
          }

          save_state() {
              mkdir -p /etc/revilis
              echo "TIER=$1" > "$STATE_FILE"
              echo "PACKS=$2" >> "$STATE_FILE"
          }

          # ---- Tier commands ----
          cmd_tier_list() {
              echo "Available hardware tiers:"
              echo ""
              for t in $(list_sections "$TIERS_FILE"); do
                  desc=$(get_field "$TIERS_FILE" "$t" DESCRIPTION)
                  printf "  %-12s - %s\n" "$t" "$desc"
              done
          }

          cmd_tier_status() {
              local tier mem_total mem_used
              tier=$(current_tier)
              mem_total=$(free -h | awk '/^Mem:/{print $2}')
              mem_used=$(free -h | awk '/^Mem:/{print $3}')
              echo "Current tier: $tier"
              echo "RAM: $mem_used / $mem_total"
          }

          cmd_tier_apply() {
              local tier="$1"
              require_root
              if ! list_sections "$TIERS_FILE" | grep -qx "$tier"; then
                  echo "Unknown tier: $tier"
                  exit 1
              fi
              log "Applying tier: $tier"
              # Actually apply the tier – we'll set zram, swappiness, services, compositor, etc.
              local zram_percent zram_algo swappiness compositor blur animations dock thumbnails indexing svc_disable svc_enable
              zram_percent=$(get_field "$TIERS_FILE" "$tier" ZRAM_PERCENT)
              zram_algo=$(get_field "$TIERS_FILE" "$tier" ZRAM_ALGO)
              swappiness=$(get_field "$TIERS_FILE" "$tier" SWAPPINESS)
              compositor=$(get_field "$TIERS_FILE" "$tier" COMPOSITOR)
              blur=$(get_field "$TIERS_FILE" "$tier" BLUR)
              animations=$(get_field "$TIERS_FILE" "$tier" ANIMATIONS)
              dock=$(get_field "$TIERS_FILE" "$tier" DOCK)
              thumbnails=$(get_field "$TIERS_FILE" "$tier" THUMBNAILS)
              indexing=$(get_field "$TIERS_FILE" "$tier" INDEXING)
              svc_disable=$(get_field "$TIERS_FILE" "$tier" SERVICES_DISABLE)
              svc_enable=$(get_field "$TIERS_FILE" "$tier" SERVICES_ENABLE)

              # ZRAM
              if command -v zramctl >/dev/null; then
                  echo "Configuring zram: ${zram_percent}% RAM, algo=$zram_algo"
                  # zram-tools on Debian uses /etc/default/zramswap
                  sed -i "s/^PERCENT=.*/PERCENT=${zram_percent}/" /etc/default/zramswap 2>/dev/null || true
                  sed -i "s/^ALGORITHM=.*/ALGORITHM=${zram_algo}/" /etc/default/zramswap 2>/dev/null || true
                  systemctl restart zramswap 2>/dev/null || true
              fi

              # Swappiness
              echo "Setting vm.swappiness=$swappiness"
              sed -i '/^vm.swappiness=/d' /etc/sysctl.conf
              echo "vm.swappiness=$swappiness" >> /etc/sysctl.conf
              sysctl -p >/dev/null

              # Services
              for svc in $svc_disable; do
                  echo "Disabling service: $svc"
                  systemctl disable --now "$svc" 2>/dev/null || true
              done
              for svc in $svc_enable; do
                  echo "Enabling service: $svc"
                  systemctl enable --now "$svc" 2>/dev/null || true
              done

              # Compositor, blur, animations
              if [[ "$compositor" == "off" ]]; then
                  echo "Disabling compositor"
                  xfconf-query -c xfwm4 -p /general/use_compositing -s false 2>/dev/null || true
                  systemctl --user stop picom 2>/dev/null || pkill picom 2>/dev/null || true
              else
                  echo "Enabling compositor"
                  xfconf-query -c xfwm4 -p /general/use_compositing -s true 2>/dev/null || true
                  if [[ "$blur" == "on" ]]; then
                      echo "Enabling blur"
                      nohup picom --config /etc/revilis/picom.conf >/dev/null 2>&1 &
                  else
                      pkill picom 2>/dev/null || true
                  fi
              fi

              if [[ "$animations" == "off" ]]; then
                  echo "Disabling animations"
                  xfconf-query -c xfwm4 -p /general/box_move -s false 2>/dev/null || true
                  xfconf-query -c xfwm4 -p /general/box_resize -s false 2>/dev/null || true
              else
                  echo "Enabling animations"
                  xfconf-query -c xfwm4 -p /general/box_move -s true 2>/dev/null || true
                  xfconf-query -c xfwm4 -p /general/box_resize -s true 2>/dev/null || true
              fi

              # Dock
              if [[ "$dock" == "off" ]]; then
                  pkill plank 2>/dev/null || true
              else
                  nohup plank >/dev/null 2>&1 &
              fi

              # Thumbnails
              if [[ "$thumbnails" == "off" ]]; then
                  xfconf-query -c thunar -p /misc-thumbnail-mode -s "THUNAR_THUMBNAIL_MODE_NEVER" 2>/dev/null || true
              else
                  xfconf-query -c thunar -p /misc-thumbnail-mode -s "THUNAR_THUMBNAIL_MODE_ONLY_LOCAL" 2>/dev/null || true
              fi

              # Indexing (mlocate)
              if [[ "$indexing" == "off" ]]; then
                  systemctl disable --now mlocate.timer 2>/dev/null || true
              else
                  systemctl enable --now mlocate.timer 2>/dev/null || true
              fi

              save_state "$tier" "$(installed_packs)"
              log "Tier '$tier' applied successfully."
              echo "Tier '$tier' applied."
          }

          # ---- Pack commands ----
          cmd_pack_list() {
              echo "Available use-case packs:"
              for p in $(list_sections "$PACKS_FILE"); do
                  desc=$(get_field "$PACKS_FILE" "$p" DESCRIPTION)
                  printf "  %-12s - %s\n" "$p" "$desc"
              done
          }

          cmd_pack_install() {
              local pack="$1"
              require_root
              if ! list_sections "$PACKS_FILE" | grep -qx "$pack"; then
                  echo "Unknown pack: $pack"
                  exit 1
              fi
              local tier weight field packages
              tier=$(current_tier)
              if [[ "$tier" == "none" ]]; then
                  echo "No tier applied yet. Use 'revilis tier apply <name>' first."
                  weight="standard"
              else
                  weight=$(get_field "$TIERS_FILE" "$tier" PACK_WEIGHT)
              fi
              case "$weight" in
                  minimal) field="PACKAGES_MINIMAL" ;;
                  standard) field="PACKAGES_STANDARD" ;;
                  full) field="PACKAGES_FULL" ;;
                  *) field="PACKAGES_STANDARD" ;;
              esac
              packages=$(get_field "$PACKS_FILE" "$pack" "$field")
              echo "Installing pack '$pack' (weight: $weight): $packages"
              apt-get update -qq
              # shellcheck disable=SC2086
              apt-get install -y --no-install-recommends $packages
              local current=$(installed_packs)
              if [[ ! " $current " =~ " $pack " ]]; then
                  save_state "$tier" "$current $pack"
              fi
              echo "Pack '$pack' installed."
          }

          cmd_pack_remove() {
              local pack="$1"
              require_root
              local tier weight field packages
              tier=$(current_tier)
              weight=$(get_field "$TIERS_FILE" "$tier" PACK_WEIGHT 2>/dev/null || echo "standard")
              case "$weight" in
                  minimal) field="PACKAGES_MINIMAL" ;;
                  standard) field="PACKAGES_STANDARD" ;;
                  full) field="PACKAGES_FULL" ;;
                  *) field="PACKAGES_STANDARD" ;;
              esac
              packages=$(get_field "$PACKS_FILE" "$pack" "$field")
              echo "Removing pack '$pack': $packages"
              # shellcheck disable=SC2086
              apt-get remove -y $packages 2>/dev/null || true
              local current=$(installed_packs)
              local new=$(echo "$current" | tr ' ' '\n' | grep -vx "$pack" | tr '\n' ' ' | xargs)
              save_state "$tier" "$new"
              echo "Pack '$pack' removed."
          }

          # ---- Health / Doctor commands ----
          cmd_health() {
              echo "=== Revilis System Health ==="
              echo "Kernel: $(uname -r)"
              echo "Uptime: $(uptime -p)"
              echo "RAM: $(free -h | awk '/^Mem:/{print $3}') / $(free -h | awk '/^Mem:/{print $2}')"
              echo "CPU Load: $(uptime | awk -F'load average:' '{print $2}')"
              echo "Disk: $(df -h / | awk 'NR==2{print $3}') / $(df -h / | awk 'NR==2{print $2}')"
              ping -c 1 google.com &>/dev/null && echo "Internet: OK" || echo "Internet: FAIL"
              echo "Services:"
              systemctl status NetworkManager | head -3 | tail -1
              systemctl status lightdm | head -3 | tail -1
          }

          cmd_doctor() {
              echo "=== Revilis Doctor – Auto Repair ==="
              # Check sources
              if ! grep -q "bookworm" /etc/apt/sources.list; then
                  echo "Fixing sources.list..."
                  sudo bash -c 'cat > /etc/apt/sources.list << EOF
          deb http://deb.debian.org/debian/ bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian/ bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF'
              fi
              # NetworkManager
              if ! systemctl is-active NetworkManager &>/dev/null; then
                  echo "Restarting NetworkManager..."
                  systemctl restart NetworkManager
              fi
              # LightDM
              if ! systemctl is-active lightdm &>/dev/null; then
                  echo "Restarting LightDM..."
                  systemctl restart lightdm
              fi
              # ZRAM
              if ! command -v zramctl >/dev/null; then
                  echo "Reinstalling zram-tools..."
                  apt-get install -y zram-tools
              fi
              echo "Running apt update..."
              apt-get update
              echo "Doctor completed."
          }

          # ---- System commands ----
          cmd_battery() {
              if [[ -f /sys/class/power_supply/BAT0/capacity ]]; then
                  echo "Battery: $(cat /sys/class/power_supply/BAT0/capacity)%"
                  echo "Status: $(cat /sys/class/power_supply/BAT0/status)"
              else
                  echo "No battery detected."
              fi
          }

          cmd_cpu() {
              echo "CPU Info:"
              lscpu | grep "Model name"
              echo "Cores: $(nproc)"
              echo "Governor: $(cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor 2>/dev/null || echo 'N/A')"
          }

          cmd_gpu() {
              lspci | grep -i "vga\|3d" || echo "No GPU detected."
              echo "GLX Info:"
              glxinfo | grep "OpenGL renderer" 2>/dev/null || echo "glxinfo not installed."
          }

          cmd_sensors() {
              sensors 2>/dev/null || echo "No sensors available."
          }

          cmd_logs() {
              journalctl -xe | tail -50
          }

          cmd_network() {
              echo "Network Interfaces:"
              nmcli device status
              echo "IP: $(ip -4 addr show | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | grep -v 127.0.0.1 | head -1 || echo 'None')"
          }

          cmd_wifi() {
              nmcli dev wifi list
              read -p "SSID: " ssid
              read -s -p "Password: " pass
              echo
              nmcli dev wifi connect "$ssid" password "$pass"
          }

          cmd_firewall() {
              echo "=== Firewall Status ==="
              ufw status verbose
              echo "Options: 1) Enable  2) Disable  3) Allow SSH  4) Deny SSH"
              read -p "Choice: " choice
              case "$choice" in
                  1) ufw enable ;;
                  2) ufw disable ;;
                  3) ufw allow ssh ;;
                  4) ufw deny ssh ;;
                  *) echo "Invalid." ;;
              esac
          }

          cmd_vpn() {
              echo "VPN Quick Connect"
              echo "1) OpenVPN  2) WireGuard"
              read -p "Choice: " vp
              case "$vp" in
                  1) read -p "Config file: " cfg; openvpn --config "$cfg" ;;
                  2) read -p "Interface: " iface; wg-quick up "$iface" ;;
              esac
          }

          cmd_backup() {
              echo "Backup /home to external drive"
              read -p "Destination path: " dest
              rsync -av --progress /home/ "$dest/revilis-backup/"
              echo "Backup complete."
          }

          cmd_snapshot() {
              echo "Creating Timeshift snapshot..."
              timeshift --create --comments "Manual snapshot"
              echo "Snapshot created."
          }

          cmd_restore() {
              echo "Restoring from Timeshift snapshot..."
              timeshift --restore
          }

          cmd_clean() {
              echo "Cleaning system..."
              apt-get clean
              apt-get autoclean
              apt-get autoremove -y
              rm -rf ~/.cache/thumbnails/* ~/.local/share/Trash/*
              journalctl --rotate
              journalctl --vacuum-time=1d
              echo "Done."
          }

          cmd_update() {
              echo "Updating system..."
              apt-get update
              apt-get upgrade -y
              echo "Done."
          }

          cmd_kernel() {
              echo "Kernel: $(uname -r)"
              echo "Available kernels:"
              dpkg -l | grep linux-image
          }

          cmd_swap() {
              echo "Swap status:"
              swapon --show
              echo "ZRAM:"
              zramctl 2>/dev/null || echo "zramctl not available"
          }

          cmd_zram() {
              echo "ZRAM status:"
              zramctl 2>/dev/null || echo "zramctl not available"
          }

          cmd_guide() {
              cat << 'GUIDE'
          =============================================
           Revilis OS – Quick Reference
          =============================================
          revilis tier list           – show all tiers
          revilis tier status         – show current tier
          revilis tier apply <name>   – switch tier
          revilis pack list           – show all packs
          revilis pack install <name> – install a pack
          revilis pack remove <name>  – remove a pack
          revilis health              – system health check
          revilis doctor              – auto repair
          revilis battery             – battery status
          revilis cpu                 – CPU info
          revilis gpu                 – GPU info
          revilis sensors             – temperature sensors
          revilis logs                – system logs
          revilis network             – network status
          revilis wifi                – connect to Wi‑Fi
          revilis firewall            – manage firewall
          revilis vpn                 – VPN connect
          revilis backup              – backup home
          revilis snapshot            – create Timeshift snapshot
          revilis restore             – restore Timeshift snapshot
          revilis clean               – clean system
          revilis update              – update system
          revilis kernel              – kernel info
          revilis swap                – swap status
          revilis zram                – ZRAM status
          revilis guide               – show this guide
          GUIDE
          }

          # ---- Main dispatch ----
          case "${1:-}" in
              tier)
                  case "${2:-}" in
                      list) cmd_tier_list ;;
                      status) cmd_tier_status ;;
                      apply) cmd_tier_apply "${3:-}" ;;
                      *) echo "Usage: revilis tier [list|status|apply <name>]" ;;
                  esac ;;
              pack)
                  case "${2:-}" in
                      list) cmd_pack_list ;;
                      install) cmd_pack_install "${3:-}" ;;
                      remove) cmd_pack_remove "${3:-}" ;;
                      *) echo "Usage: revilis pack [list|install <name>|remove <name>]" ;;
                  esac ;;
              health) cmd_health ;;
              doctor) cmd_doctor ;;
              battery) cmd_battery ;;
              cpu) cmd_cpu ;;
              gpu) cmd_gpu ;;
              sensors) cmd_sensors ;;
              logs) cmd_logs ;;
              network) cmd_network ;;
              wifi) cmd_wifi ;;
              firewall) cmd_firewall ;;
              vpn) cmd_vpn ;;
              backup) cmd_backup ;;
              snapshot) cmd_snapshot ;;
              restore) cmd_restore ;;
              clean) cmd_clean ;;
              update) cmd_update ;;
              kernel) cmd_kernel ;;
              swap) cmd_swap ;;
              zram) cmd_zram ;;
              guide) cmd_guide ;;
              status) cmd_tier_status; echo; echo "Packs: $(installed_packs)";;
              "") cmd_guide ;;
              *) echo "Unknown command. Run 'revilis guide'." ;;
          esac
          REVILIS
          chmod +x config/includes.chroot/usr/local/bin/revilis

          # ----------------------------------------------------------------
          # 5. FIRST-BOOT GUI (full wizard)
          # ----------------------------------------------------------------
          cat > config/includes.chroot/usr/local/bin/revilis-firstboot-gui << 'FIRSTBOOT'
          #!/usr/bin/env bash
          set -e
          MARKER="$HOME/.config/revilis/.firstboot-done"
          if [[ -f "$MARKER" ]]; then exit 0; fi
          if ! command -v zenity >/dev/null; then exit 0; fi

          zenity --info --width=500 --text="<b>Welcome to Revilis OS</b>\n\nThis wizard will help you set up your system.\nYou can choose a hardware tier and install software packs.\nAll settings can be changed later using the 'revilis' command."

          # Locale
          LOCALE=$(zenity --list --title="Select Locale" --column="Locale" \
              "en_US.UTF-8" "de_DE.UTF-8" "fr_FR.UTF-8" "es_ES.UTF-8" "hi_IN.UTF-8" --width=300 --height=200)
          if [[ -n "$LOCALE" ]]; then
              sudo localectl set-locale LANG="$LOCALE"
              sudo locale-gen "$LOCALE"
          fi

          # Timezone
          TZ=$(zenity --entry --text="Enter timezone (e.g., America/New_York):" --entry-text="UTC")
          if [[ -n "$TZ" ]]; then
              sudo timedatectl set-timezone "$TZ" 2>/dev/null || true
          fi

          # Password for liveuser (optional)
          PWD=$(zenity --entry --hide-text --text="Set a password for user 'liveuser' (leave blank to keep 'live'):")
          if [[ -n "$PWD" ]]; then
              echo "liveuser:$PWD" | sudo chpasswd
          fi

          # Tier
          TIER=$(zenity --list --radiolist --title="Hardware Tier" --column="Pick" --column="Tier" --column="Description" \
              TRUE "balanced" "Recommended for most hardware" \
              FALSE "potato" "Bare minimum (~1GB RAM)" \
              FALSE "light" "Low-spec but usable" \
              FALSE "performance" "Capable hardware" \
              FALSE "maxed" "Everything enabled" \
              --width=600 --height=300)

          # Packs
          PACKS=$(zenity --list --checklist --title="Install Packs" --column="Pick" --column="Pack" --column="Description" \
              FALSE "developer" "Code editors, git, runtimes" \
              FALSE "gamer" "Gaming platforms, emulation" \
              TRUE "office" "Documents, spreadsheets" \
              TRUE "home" "Browsing, media, communication" \
              FALSE "security" "Security tools" \
              FALSE "creative" "Graphics, audio, video" \
              --separator=" " --width=600 --height=350)

          # Apply
          if [[ -n "$TIER" || -n "$PACKS" ]]; then
              xfce4-terminal --title="Revilis Setup" -e "bash -c ' \
                  echo \"Applying tier: $TIER\"; \
                  if [[ -n \"$TIER\" ]]; then sudo revilis tier apply \"$TIER\"; fi; \
                  for p in $PACKS; do sudo revilis pack install \"\$p\"; done; \
                  echo; echo \"Setup complete. Press Enter to close...\"; read'"
          fi

          mkdir -p "$HOME/.config/revilis"
          touch "$MARKER"
          FIRSTBOOT
          chmod +x config/includes.chroot/usr/local/bin/revilis-firstboot-gui

          # ----------------------------------------------------------------
          # 6. DESKTOP CONFIGURATIONS (Mac-inspired, fully themed)
          # ----------------------------------------------------------------
          mkdir -p config/includes.chroot/etc/skel/.config/xfce4/xfconf/xfce-perchannel-xml
          mkdir -p config/includes.chroot/etc/skel/.config/plank/dock1
          mkdir -p config/includes.chroot/etc/skel/.config/autostart
          mkdir -p config/includes.chroot/etc/skel/Desktop
          mkdir -p config/includes.chroot/etc/skel/.config/gtk-3.0
          mkdir -p config/includes.chroot/etc/skel/.config/gtk-4.0

          # Panel: top bar with app menu, systray, clock
          cat > config/includes.chroot/etc/skel/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml << 'PANEL'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-panel" version="1.0">
            <property name="panels" type="array">
              <value type="int" value="1"/>
              <property name="panel-1" type="empty">
                <property name="position" type="string" value="p=6;x=0;y=0"/>
                <property name="position-locked" type="bool" value="true"/>
                <property name="length" type="uint" value="100"/>
                <property name="size" type="uint" value="28"/>
                <property name="plugin-ids" type="array">
                  <value type="int" value="1"/>
                  <value type="int" value="2"/>
                  <value type="int" value="3"/>
                  <value type="int" value="4"/>
                </property>
              </property>
            </property>
            <property name="plugins" type="empty">
              <property name="plugin-1" type="string" value="applicationsmenu">
                <property name="button-title" type="string" value="Revilis"/>
                <property name="show-button-title" type="bool" value="true"/>
              </property>
              <property name="plugin-2" type="string" value="separator">
                <property name="expand" type="bool" value="true"/>
                <property name="style" type="uint" value="0"/>
              </property>
              <property name="plugin-3" type="string" value="systray"/>
              <property name="plugin-4" type="string" value="clock">
                <property name="digital-format" type="string" value="%a %b %e  %I:%M %p"/>
              </property>
            </property>
          </channel>
          PANEL

          # Window Manager: Arc-Dark, macOS button layout
          cat > config/includes.chroot/etc/skel/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml << 'XFWM'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="theme" type="string" value="Arc-Dark"/>
              <property name="title_font" type="string" value="Inter Medium 9"/>
              <property name="button_layout" type="string" value="|H M C"/>
              <property name="use_compositing" type="bool" value="true"/>
              <property name="show_frame_shadow" type="bool" value="true"/>
              <property name="frame_border_top" type="uint" value="1"/>
            </property>
          </channel>
          XFWM

          # XSettings: dark theme, Papirus icons, Inter font
          cat > config/includes.chroot/etc/skel/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml << 'XSET'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xsettings" version="1.0">
            <property name="Net" type="empty">
              <property name="ThemeName" type="string" value="Arc-Dark"/>
              <property name="IconThemeName" type="string" value="Papirus"/>
            </property>
            <property name="Gtk" type="empty">
              <property name="FontName" type="string" value="Inter 10"/>
            </property>
          </channel>
          XSET

          # Plank dock: translucent, centered, intelligent hide
          cat > config/includes.chroot/etc/skel/.config/plank/dock1/settings << 'PLANK'
          [PlankDockPreferences]
          Position=bottom
          Alignment=center
          IconSize=48
          ZoomEnabled=true
          ZoomPercent=150
          HideMode=intelligent
