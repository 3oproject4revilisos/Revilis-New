          %liveuser ALL=(ALL) NOPASSWD: /usr/local/bin/revilis
          %revilis  ALL=(ALL) NOPASSWD: /usr/local/bin/revilis
          SUDOERS
          chmod 440 config/includes.chroot/etc/sudoers.d/revilis

          # ----------------------------------------------------------------
          # 14. POST-INSTALL HOOK (copies revilis to installed system)
          # ----------------------------------------------------------------
          cat > config/hooks/live/9010-revilis-setup.hook.chroot << 'HOOK'
          #!/bin/sh
          set -e
          groupadd -f revilis
          if ! id liveuser >/dev/null 2>&1; then
              useradd -m -s /bin/bash -G sudo,revilis,netdev,plugdev,audio,video liveuser
              echo "liveuser:live" | chpasswd
          fi
          # Copy revilis configs to /target so installed system gets them
          mkdir -p /target/etc/revilis /target/usr/local/bin /target/etc/sudoers.d
          cp -r /etc/revilis /target/etc/ 2>/dev/null || true
          cp /usr/local/bin/revilis /target/usr/local/bin/ 2>/dev/null || true
          cp /usr/local/bin/revilis-firstboot-gui /target/usr/local/bin/ 2>/dev/null || true
          cp /usr/local/bin/revilis-wallpaper-gen /target/usr/local/bin/ 2>/dev/null || true
          cp /usr/local/bin/revilis-lock /target/usr/local/bin/ 2>/dev/null || true
          cp /etc/sudoers.d/revilis /target/etc/sudoers.d/ 2>/dev/null || true
          systemctl enable NetworkManager || true
          systemctl enable lightdm || true
          HOOK
          chmod +x config/hooks/live/9010-revilis-setup.hook.chroot

          # ----------------------------------------------------------------
          # 15. AUTO-ERROR HANDLING: systemd watchdog + self-healing service
          # ----------------------------------------------------------------
          mkdir -p config/includes.chroot/etc/systemd/system
          cat > config/includes.chroot/etc/systemd/system/revilis-health.service << 'HEALTHSVC'
          [Unit]
          Description=Revilis Health Check (auto-repair)
          After=multi-user.target
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/revilis doctor
          ExecStart=/usr/local/bin/revilis health
          [Install]
          WantedBy=multi-user.target
          HEALTHSVC

          cat > config/includes.chroot/etc/systemd/system/revilis-watchdog.service << 'WATCHDOG'
          [Unit]
          Description=Revilis Watchdog (restart failed services)
          After=multi-user.target
          [Service]
          Type=simple
          ExecStart=/bin/bash -c "while true; do systemctl is-active lightdm || systemctl restart lightdm; systemctl is-active NetworkManager || systemctl restart NetworkManager; sleep 60; done"
          Restart=always
          [Install]
          WantedBy=multi-user.target
          WATCHDOG

          # Enable them in a hook
          cat >> config/hooks/live/9010-revilis-setup.hook.chroot << 'WATCHHOOK'
          systemctl enable revilis-health.service || true
          systemctl enable revilis-watchdog.service || true
          WATCHHOOK

          # ----------------------------------------------------------------
          # 16. SPACE MANAGEMENT: logrotate, cleanup scripts
          # ----------------------------------------------------------------
          cat > config/includes.chroot/etc/cron.daily/revilis-cleanup << 'CLEANUP'
          #!/bin/sh
          /usr/local/bin/revilis clean
          CLEANUP
          chmod +x config/includes.chroot/etc/cron.daily/revilis-cleanup

          # ----------------------------------------------------------------
          # 17. AI ASSISTANT (llama.cpp) – minimal installation stub
          # ----------------------------------------------------------------
          # We'll install llama.cpp and download a model as a post-install pack.
          # For now, we just create a wrapper script.
          cat > config/includes.chroot/usr/local/bin/revilis-ai << 'AI'
          #!/bin/bash
          # Stub for AI assistant – will be expanded in future
          echo "AI assistant coming soon. Install llama.cpp via revilis pack developer."
          AI
          chmod +x config/includes.chroot/usr/local/bin/revilis-ai

          # ----------------------------------------------------------------
          # 18. BUILD THE ISO
          # ----------------------------------------------------------------
          lb build 2>&1 | tee build.log

      - name: Inspect ISO
        if: always()
        working-directory: livebuild-config
        run: |
          ISO=$(find . -maxdepth 1 -name "*.iso" | head -1)
          if [ -z "$ISO" ]; then
            echo "No ISO produced."
            tail -100 build.log
            exit 1
          fi
          echo "ISO built: $ISO"
          xorriso -indev "$ISO" -report_el_torito plain 2>&1 || true

      - name: Rename ISO
        id: rename
        working-directory: livebuild-config
        run: |
          ISO=$(find . -maxdepth 1 -name "*.iso" | head -1)
          DATE=$(date +%Y%m%d)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          NEW="revilis-mega-${DATE}-${SHA}.iso"
          mv "$ISO" "$NEW"
          echo "ISO_NAME=$NEW" >> $GITHUB_ENV

      - name: Generate checksum
        working-directory: livebuild-config
        run: sha256sum "${{ env.ISO_NAME }}" > "${{ env.ISO_NAME }}.sha256"

      - name: QEMU boot test (BIOS mode)
        if: success()
        working-directory: livebuild-config
        timeout-minutes: 5
        run: |
          sudo apt-get install -y qemu-system-x86 >/dev/null 2>&1
          timeout --signal=KILL 60 qemu-system-x86_64 -m 1024 -cdrom "${{ env.ISO_NAME }}" -boot d -display none -no-reboot &
          sleep 60
          if pgrep -f qemu-system-x86_64; then
            echo "Boot test: QEMU still running – likely successful."
          else
            echo "Boot test: QEMU exited early – may have failed."
          fi
          sudo pkill -f qemu-system-x86_64 2>/dev/null || true

      - name: Upload ISO artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: revilis-mega-iso
          path: |
            livebuild-config/${{ env.ISO_NAME }}
            livebuild-config/${{ env.ISO_NAME }}.sha256
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: livebuild-config/build.log
          retention-days: 3

      - name: Create GitHub Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release == true)
        uses: softprops/action-gh-release@v1
        with:
          files: |
            livebuild-config/${{ env.ISO_NAME }}
            livebuild-config/${{ env.ISO_NAME }}.sha256
          generate_release_notes: true
