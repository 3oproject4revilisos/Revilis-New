          # Desktop shortcuts
          cat > config/includes.chroot/etc/skel/Desktop/revilis-guide.desktop << 'GUIDE'
          [Desktop Entry]
          Type=Application
          Name=📖 Revilis Guide
          Exec=xfce4-terminal -e "revilis guide; read -p 'Press Enter to close...'"
          Icon=help-about
          Terminal=false
          GUIDE

          cat > config/includes.chroot/etc/skel/Desktop/revilis-settings.desktop << 'SETTINGS'
          [Desktop Entry]
          Type=Application
          Name=⚙️ Revilis Settings
          Exec=xfce4-terminal -e "revilis; read -p 'Press Enter to close...'"
          Icon=preferences-system
          Terminal=false
          SETTINGS

          cat > config/includes.chroot/etc/skel/Desktop/revilis-health.desktop << 'HEALTH'
          [Desktop Entry]
          Type=Application
          Name=🏥 Revilis Health
          Exec=xfce4-terminal -e "revilis health; read -p 'Press Enter to close...'"
          Icon=utilities-system-monitor
          Terminal=false
          HEALTH

          # ----------------------------------------------------------------
          # 7. PICOM CONFIG (blur, shadows, rounded corners)
          # ----------------------------------------------------------------
          mkdir -p config/includes.chroot/etc/revilis
          cat > config/includes.chroot/etc/revilis/picom.conf << 'PICOM'
          backend = "glx";
          vsync = true;
          blur-method = "dual_kawase";
          blur-strength = 7;
          blur-background = true;
          blur-background-frame = true;
          blur-background-fixed = true;
          corner-radius = 10;
